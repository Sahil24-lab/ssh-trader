repos:
  - repo: local
    hooks:
      - id: gitleaks-staged
        name: gitleaks staged secrets
        entry: scripts/run_gitleaks_precommit.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: trivy-repo
        name: trivy repo scan
        entry: scripts/run_trivy_fs.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pytest]
        args: [src, tests]
        pass_filenames: false
